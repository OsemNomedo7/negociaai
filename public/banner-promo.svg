<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080F"/>
      <stop offset="45%" stop-color="#0E0B2C"/>
      <stop offset="100%" stop-color="#080618"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="280" rx="0"/>
    </clipPath>
  </defs>

  <!-- BG -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="220" cy="140" rx="320" ry="200" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="980" cy="140" rx="280" ry="180" fill="url(#glow2)" filter="url(#blur1)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="750" y1="0" x2="750" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="280" fill="url(#grad)"/>

  <!-- Badge -->
  <rect x="72" y="42" width="198" height="30" rx="15" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.35)" stroke-width="1"/>
  <circle cx="90" cy="57" r="4" fill="#f97316"/>
  <text x="100" y="62" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#fb923c" letter-spacing="1.5">OFERTA POR TEMPO LIMITADO</text>

  <!-- Main headline -->
  <text x="72" y="118" font-family="Inter,system-ui,sans-serif" font-size="54" font-weight="900" fill="white" letter-spacing="-2">LIMPE SEU NOME</text>

  <!-- Gradient word -->
  <text x="72" y="173" font-family="Inter,system-ui,sans-serif" font-size="46" font-weight="900" letter-spacing="-1.5">
    <tspan fill="rgba(255,255,255,0.45)">COM ATÉ </tspan><tspan fill="url(#grad)">60% DE DESCONTO</tspan>
  </text>

  <!-- Subtitle -->
  <text x="72" y="213" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.5)">Processo 100% digital · Resultado imediato · Segurança garantida</text>

  <!-- CTA Button -->
  <rect x="72" y="230" width="210" height="36" rx="10" fill="url(#grad)"/>
  <text x="177" y="253" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Consultar grátis agora →</text>

  <!-- Right side decorative stats -->
  <!-- Stat 1 -->
  <rect x="820" y="60" width="140" height="72" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="890" y="98" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">R$ 2.8B+</text>
  <text x="890" y="118" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.4)" text-anchor="middle">Dívidas negociadas</text>

  <!-- Stat 2 -->
  <rect x="980" y="60" width="140" height="72" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1050" y="98" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="900" fill="url(#grad)" text-anchor="middle" letter-spacing="-1">340K+</text>
  <text x="1050" y="118" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.4)" text-anchor="middle">CPFs regularizados</text>

  <!-- Stat 3 -->
  <rect x="820" y="148" width="140" height="72" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="890" y="186" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">4.9★</text>
  <text x="890" y="206" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.4)" text-anchor="middle">Avaliação média</text>

  <!-- Stat 4 -->
  <rect x="980" y="148" width="140" height="72" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1050" y="186" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="900" fill="url(#grad2)" text-anchor="middle" letter-spacing="-1">60%</text>
  <text x="1050" y="206" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.4)" text-anchor="middle">Desconto médio</text>

  <!-- Decorative circles -->
  <circle cx="700" cy="50" r="100" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <circle cx="700" cy="50" r="60" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>

  <!-- Bottom accent line -->
  <rect x="0" y="276" width="1200" height="4" fill="url(#grad)" opacity="0.6"/>
</svg>
